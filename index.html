<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Clique Monsieur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="assets/cursor.png">
</head>

<body>
    <script src="list.js" defer></script>
    <script src="draw.js" defer></script>
    <script src="script.js" defer></script>
    <div id="clique-page" class="page">
        <img id="monsieur" src="assets/title.png" alt="Monsieur" onclick="cliqueMonsieur()">
        <p id="compte-monsieur"></p>
    </div>
    <div id="dessine-page" class="page hidden">
        <div id="dessine-monsieur">
            <canvas id="dessine-canvas" width="200" height="200"></canvas>
            <div id="dessine-tools">
                <div id="main-tools">
                    <img id="pen-tool" class="dessine-tool active-tool" src="assets/pencil_24p.png" onclick="changeTool('pen')">
                    <img id="bucket-tool" class="dessine-tool" src="assets/bucket_24p.png" onclick="changeTool('bucket')">
                </div>
                <div id="color">
                    <input type="color" id="color-picker-input" oninput="changeColor()">
                </div>
                <div>
                    <img id="undo-button" class="dessine-tool-disabled" src="assets/undo.png" onclick="undoCanvas()">
                    <img id="redo-button" class="dessine-tool-disabled" src="assets/redo.png" onclick="redoCanvas()">
                </div>
            </div>
        </div>
        <p id="dessine-monsieur-description">Dessine Monsieur</p>
    </div>
    <div id="menu">
        <img id="clique-nav" class="active-nav" src="assets/cursor_24p.png" onclick="navigate('clique')">
        <img id="dessine-nav" src="assets/pencil_24p.png" onclick="navigate('dessine')">
    </div>
    <a id="acknowledgements" href="https://github.com/FeelDee/cliquemonsieur">créé par Félix Brun et Philippe Ducas</a>
</body>

</html>
