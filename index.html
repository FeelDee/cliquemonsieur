<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Clique Monsieur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="assets/cursor.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <script src="observable.js" defer></script>
    <script src="storage.js" defer></script>
    <script src="list.js" defer></script>
    <script src="draw.js" defer></script>
    <script src="gallery.js" defer></script>
    <script src="main.js" defer></script>
    <div id="clique-page" class="page">
        <p id="title">clique monsieur</p>
        <img id="monsieur" class="hidden" onclick="cliqueMonsieur()">
        <p id="compte-monsieur"></p>
    </div>
    <div id="dessine-page" class="page hidden">
        <div id="dessine-monsieur">
            <canvas id="dessine-canvas" width="200" height="200"></canvas>
            <div id="dessine-tools">
                <button id="pen-tool" class="icon-button active" onclick="changeTool('pen')">
                    <img src="assets/pencil.png">
                </button>
                <button id="bucket-tool" class="icon-button" onclick="changeTool('bucket')">
                    <img src="assets/bucket.png">
                </button>
                <input type="color" id="color-picker-input" oninput="changeColor()">
            </div>
            <div id="utility-tools">
                <button id="save-button" class="icon-button" onclick="openSaveModal()">
                    <img src="assets/floppydisk.png">
                </button>
                <button id="undo-button" class="icon-button" onclick="undoCanvas()" disabled>
                    <img src="assets/undo.png">
                </button>
                <button id="redo-button" class="icon-button" onclick="redoCanvas()" disabled>
                    <img src="assets/redo.png">
                </button>
            </div>
        </div>
        <dialog id="save-dialog">
            <p>Sauvegarde ton monsieur</p>
            <img id="save-dialog-img">
            <form method="dialog">
                <p>
                    <label>
                        Nom du monsieur :
                        <input name="name" value="mon magnifique monsieur">
                    </label>
                </p>
                <p>
                    <label>
                        Occurences :</span>
                        <input name="occurrences" type="number" min="0" value="10">
                    </label>
                </p>
                <button value="submit">Sauvegarder</button>
                <button value="cancel">Annuler</button>
            </form>
        </dialog>
        <p id="dessine-monsieur-description">Dessine ton Monsieur!</p>
    </div>
    <div id="gallery-page" class="page hidden">
        <div id="gallery-list"></div>
    </div>
    <div id="menu">
        <button id="clique-nav" class="icon-button active" onclick="navigate('clique')"><img src="assets/cursor_24p.png"></button>
        <button id="dessine-nav" class="icon-button" onclick="navigate('dessine')"><img src="assets/pencil.png" ></button>
        <button id="gallery-nav" class="icon-button" onclick="navigate('gallery')"><img src="assets/folder.png"></button>
    </div>
    <a id="acknowledgements" href="https://github.com/FeelDee/cliquemonsieur">créé par Félix Brun et Philippe Ducas</a>
</body>

</html>
